name: review (reusable)

# Runs the "reviewer" role: independent, read-only verification of an
# implementation PR against its approved change package. Which model fills
# this role is resolved from THIS repo's own config/roles.yml.
#
# Known limitation: the *model* is config-driven (roles.yml), but the
# *execution step* below is still Claude Code CLI-specific (its own install
# step, its own --allowedTools flag). Swapping the reviewer role to a
# different vendor's CLI/action means editing the "Run independent
# verification" step itself, not just roles.yml - full run-time provider
# abstraction isn't built yet. Don't claim more decoupling than exists.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      package_path:
        description: 'Path to the change package directory, e.g. "specs/changes/VOC-007-some-slug"'
        required: true
        type: string
      integration_branch:
        description: 'The calling project''s integration branch the package lives on - "develop" for a develop/main split, "main" for GitHub-flow-only projects.'
        required: false
        type: string
        default: "develop"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # No repo checked out yet at this point - gh needs GH_REPO set
      # explicitly rather than inferring it from a local git remote (same
      # fix already applied in remediate.yml's own metadata-parsing step,
      # for the identical reason).
      - name: Fetch PR diff, metadata, and exact SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
          gh pr view ${{ inputs.pr_number }} --json body,title,headRefOid > /tmp/pr.json
          echo "sha=$(jq -r .headRefOid /tmp/pr.json)" >> "$GITHUB_OUTPUT"

      # Checks out the PR's own reviewed commit, not integration_branch -
      # found live (VOC-022-T00) that checking out integration_branch here
      # gave the reviewer a tree that genuinely did not contain the commit
      # it was told to review, and no way to fetch it either (read-only
      # Read/Grep/Glob tools, no Bash). Twice now this has produced a bad
      # review: once the model asked an unanswerable question instead of a
      # verdict (fixed in prompts/review.md), and once it correctly
      # disclosed the limitation per that fix but still treated "commit
      # unreachable" as a disqualifying Critical finding on an otherwise-
      # clean structural review - the actual root cause was always that the
      # commit really was unreachable, not a model quality problem either
      # time. Checking out the exact reviewed SHA removes the root cause:
      # the reviewer now has the real file tree for what it's reviewing.
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Checkout karsift-ai-infra
        uses: actions/checkout@v4
        with:
          repository: KARSIFT/karsift-ai-infra
          path: karsift-ai-infra

      # Routes a remediate.yml retry (attempt 2) on a low-risk (R0/R1)
      # package to a cheaper/faster model (config/roles.yml's
      # `reviewer_fast_retry`) instead of the full `reviewer` model - see
      # that role's comment for why this is scoped to retries only, never a
      # first-pass review, and never R2+. Both attempt and risk are parsed
      # here rather than plumbed as new inputs from pipeline.yml: attempt is
      # already embedded in the PR body ("attempt N of 2", the same text
      # remediate.yml itself parses), and risk is already in change.yaml,
      # which this job reads anyway for the prompt below - no new wiring
      # needed in the calling project's pipeline.yml.
      - name: Resolve reviewer model
        id: model
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          attempt=$(jq -r .body /tmp/pr.json | grep -oP '(?<=attempt )[0-9]+(?= of 2)' | head -1 || echo "1")
          risk=$(grep -oP '^risk:\s*\K.*' "${{ inputs.package_path }}/change.yaml" 2>/dev/null | head -1 || echo "")

          role="reviewer"
          if [ "$attempt" -ge 2 ] && { [ "$risk" = "R0" ] || [ "$risk" = "R1" ]; }; then
            fast=$(bash karsift-ai-infra/config/resolve-model.sh reviewer_fast_retry karsift-ai-infra/config/roles.yml || echo "")
            if [ -n "$fast" ]; then
              role="reviewer_fast_retry"
            fi
          fi
          echo "Routing this review as: role=$role (attempt=$attempt, risk=${risk:-unknown})"

          MODEL=$(bash karsift-ai-infra/config/resolve-model.sh "$role" karsift-ai-infra/config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "role=$role" >> "$GITHUB_OUTPUT"

      # Static across every single review this pipeline ever runs (same
      # bytes regardless of project, PR, or attempt) - passed as the system
      # prompt specifically so Anthropic's prompt caching can hit on it.
      # Caching is keyed on exact prefix content under the same API key,
      # not on CLI process/session, so this benefits across separate CI
      # containers (e.g. attempt 1 vs. attempt 2 of the same PR, or two
      # unrelated PRs reviewed minutes apart) as long as they land within
      # the cache TTL - unlike the per-review variable content below, which
      # never repeats and so never benefits from caching regardless of how
      # it's passed.
      - name: Build variable (per-review) prompt
        run: |
          {
            echo "## Reviewed commit SHA: ${{ steps.pr.outputs.sha }}"
            echo
            echo "## Package under review"
            echo
            echo "### specification.md"
            cat "${{ inputs.package_path }}/specification.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### acceptance-criteria.md"
            cat "${{ inputs.package_path }}/acceptance-criteria.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### impact-analysis.md (protected areas, declared risk)"
            cat "${{ inputs.package_path }}/impact-analysis.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### change.yaml"
            cat "${{ inputs.package_path }}/change.yaml" 2>/dev/null || echo "(missing)"
            echo
            echo "## PR metadata"
            cat /tmp/pr.json
            echo
            echo "## Diff"
            cat /tmp/pr.diff
          } > /tmp/review-prompt.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # Read-only tools only, no --dangerously-skip-permissions: the reviewer
      # role has no repository-write authority here, by design, not just as
      # an implementation convenience.
      #
      # prompts/review.md goes in via --append-system-prompt (static, cache-
      # eligible, identical every run), not concatenated into the -p prompt
      # text as before - splitting the two is what makes the caching note
      # above actually apply; before this, the static instructions and the
      # never-repeating package content were one prefix, invalidating any
      # would-be cache hit on the static portion.
      #
      # --bare: Anthropic's own docs name this "the recommended mode for
      # scripted and SDK calls" - it skips auto-discovery of hooks, skills,
      # plugins, MCP servers, auto memory, and the *calling project's own*
      # CLAUDE.md (this job's working directory is the checked-out project
      # repo, which has one), none of which this stateless, single-purpose
      # reviewer role needs or was ever intentionally relying on - the
      # review instructions it actually needs are prompts/review.md, passed
      # explicitly above. Not yet measured how much this saves by itself;
      # watch actual cost across the next few reviews (see the cost-logging
      # step below, added at the same time specifically to make that
      # measurable instead of guessed at).
      #
      # --output-format json: the plain-text default gave zero visibility
      # into actual token/cache/cost usage, making it impossible to confirm
      # whether prompt caching (above) was doing anything - found this gap
      # live after a user-reported $1.75-per-task Claude spend with no way
      # to verify what the scoping/caching/model-routing changes had
      # actually done. `.result` holds the same verdict text the old plain-
      # text output was; `.total_cost_usd` and the per-model usage block
      # (including cache_read_input_tokens/cache_creation_input_tokens) are
      # now logged below for exactly this kind of debugging going forward.
      - name: Run independent verification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          claude --model "${{ steps.model.outputs.model }}" \
            --bare \
            --append-system-prompt "$(cat karsift-ai-infra/prompts/review.md)" \
            --allowedTools "Read,Grep,Glob" \
            --output-format json \
            -p "$(cat /tmp/review-prompt.txt)" > /tmp/verdict-raw.json

          jq -r '.result' /tmp/verdict-raw.json > /tmp/verdict.md
          cat /tmp/verdict.md

          echo "--- cost/cache telemetry ---"
          jq '{total_cost_usd, usage}' /tmp/verdict-raw.json || true

      - name: Post verification comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**Independent verification - bound to commit \`${{ steps.pr.outputs.sha }}\`**"
            echo
            cat /tmp/verdict.md
          } > /tmp/verdict-comment.md
          gh pr comment ${{ inputs.pr_number }} --body-file /tmp/verdict-comment.md
