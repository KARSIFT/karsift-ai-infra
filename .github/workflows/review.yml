name: review (reusable)

# Runs the "reviewer" role: independent, read-only verification of an
# implementation PR against its approved change package. Which model fills
# this role is resolved from THIS repo's own config/roles.yml.
#
# Known limitation: the *model* is config-driven (roles.yml), but the
# *execution step* below is still Claude Code CLI-specific (its own install
# step, its own --allowedTools flag). Swapping the reviewer role to a
# different vendor's CLI/action means editing the "Run independent
# verification" step itself, not just roles.yml - full run-time provider
# abstraction isn't built yet. Don't claim more decoupling than exists.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      package_path:
        description: 'Path to the change package directory, e.g. "specs/changes/VOC-007-some-slug"'
        required: true
        type: string
      integration_branch:
        description: 'The calling project''s integration branch the package lives on - "develop" for a develop/main split, "main" for GitHub-flow-only projects.'
        required: false
        type: string
        default: "develop"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.integration_branch }}

      - name: Checkout karsift-ai-infra
        uses: actions/checkout@v4
        with:
          repository: KARSIFT/karsift-ai-infra
          path: karsift-ai-infra

      - name: Resolve reviewer model
        id: model
        run: |
          MODEL=$(bash karsift-ai-infra/config/resolve-model.sh reviewer karsift-ai-infra/config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Fetch PR diff, metadata, and exact SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
          gh pr view ${{ inputs.pr_number }} --json body,title,headRefOid > /tmp/pr.json
          echo "sha=$(jq -r .headRefOid /tmp/pr.json)" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        run: |
          {
            cat karsift-ai-infra/prompts/review.md
            echo
            echo "## Reviewed commit SHA: ${{ steps.pr.outputs.sha }}"
            echo
            echo "## Package under review"
            echo
            echo "### specification.md"
            cat "${{ inputs.package_path }}/specification.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### acceptance-criteria.md"
            cat "${{ inputs.package_path }}/acceptance-criteria.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### impact-analysis.md (protected areas, declared risk)"
            cat "${{ inputs.package_path }}/impact-analysis.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### change.yaml"
            cat "${{ inputs.package_path }}/change.yaml" 2>/dev/null || echo "(missing)"
            echo
            echo "## PR metadata"
            cat /tmp/pr.json
            echo
            echo "## Diff"
            cat /tmp/pr.diff
          } > /tmp/review-prompt.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # Read-only tools only, no --dangerously-skip-permissions: the reviewer
      # role has no repository-write authority here, by design, not just as
      # an implementation convenience.
      - name: Run independent verification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          claude --model "${{ steps.model.outputs.model }}" \
            --allowedTools "Read,Grep,Glob" \
            -p "$(cat /tmp/review-prompt.txt)" > /tmp/verdict.md
          cat /tmp/verdict.md

      - name: Post verification comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**Independent verification - bound to commit \`${{ steps.pr.outputs.sha }}\`**"
            echo
            cat /tmp/verdict.md
          } > /tmp/verdict-comment.md
          gh pr comment ${{ inputs.pr_number }} --body-file /tmp/verdict-comment.md
