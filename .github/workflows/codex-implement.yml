name: codex-implement (reusable)

on:
  workflow_call:
    inputs:
      voc_id:
        description: 'The adopted change package to implement from, e.g. "VOC-007"'
        required: true
        type: string
      package_path:
        description: 'Path to the package under specs/changes/, e.g. "specs/changes/VOC-007-some-slug"'
        required: true
        type: string
      task_id:
        description: "The specific task ID from the package's tasks.md being implemented this run"
        required: true
        type: string
      issue_number:
        description: "The GitHub issue carrying implementation authority for this task"
        required: true
        type: string
      attempt:
        description: 1 or 2. On attempt 2 failure, escalate to the issue and stop - no attempt 3.
        required: false
        type: string
        default: "1"
    secrets:
      OPENAI_API_KEY:
        required: true

jobs:
  codex-implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Checkout vocanova-ai-infra
        uses: actions/checkout@v4
        with:
          repository: KARSIFT/vocanova-ai-infra
          path: vocanova-ai-infra

      - name: Refuse to run without an adopted, authorized package
        run: |
          pip install --quiet pyyaml
          python3 - "${{ inputs.package_path }}" "${{ inputs.issue_number }}" <<'PYEOF'
          import sys
          import yaml

          package_path, expected_issue = sys.argv[1:3]
          data = yaml.safe_load(open(f"{package_path}/change.yaml"))

          if data.get("status") not in ("implementing", "adopted", "implementation-ready"):
              sys.exit(f"Package status '{data.get('status')}' is not implementation-ready - refusing to run.")

          impl = data.get("implementation", {})
          if not impl.get("authorized"):
              sys.exit("Package implementation.authorized is not true - refusing to run.")

          authority_issue = str(impl.get("authority_issue", ""))
          if authority_issue and authority_issue != str(expected_issue):
              sys.exit(
                  f"Package authority_issue ({authority_issue}) does not match "
                  f"the issue this run was dispatched for ({expected_issue})."
              )

          print("Package is adopted and authorized - proceeding.")
          PYEOF

      - name: Create implementation branch
        id: branch
        run: |
          set -euo pipefail
          slug=$(echo "${{ inputs.task_id }}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-' | sed 's/-\+/-/g; s/^-//; s/-$//')
          voc_lower=$(echo "${{ inputs.voc_id }}" | tr '[:upper:]' '[:lower:]')
          branch="agent/${voc_lower}-${slug}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch"

      - name: Resolve Codex model
        id: model
        run: |
          MODEL=$(bash vocanova-ai-infra/config/resolve-model.sh codex vocanova-ai-infra/config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        id: prompt
        run: |
          {
            cat vocanova-ai-infra/prompts/codex-implement.md
            echo
            echo "## Package: ${{ inputs.voc_id }}"
            echo
            echo "### specification.md"
            cat "${{ inputs.package_path }}/specification.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### acceptance-criteria.md"
            cat "${{ inputs.package_path }}/acceptance-criteria.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### implementation-plan.md"
            cat "${{ inputs.package_path }}/implementation-plan.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### tasks.md"
            cat "${{ inputs.package_path }}/tasks.md" 2>/dev/null || echo "(missing)"
            echo
            echo "## Task to implement now"
            echo "Task ID: ${{ inputs.task_id }}"
            echo "This is attempt ${{ inputs.attempt }} of 2."
          } > /tmp/codex-prompt.txt

      # codex-action only runs `codex exec` in a sandbox - it never touches git.
      # Committing, pushing, and opening the PR are deterministic steps below.
      - name: Implement with Codex
        id: codex
        uses: openai/codex-action@v1
        continue-on-error: true
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: /tmp/codex-prompt.txt
          permission-profile: ":workspace"
          model: ${{ steps.model.outputs.model }}

      - name: Commit and push
        id: commit
        if: steps.codex.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "vocanova-ai-infra-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Codex made no changes - nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "${{ inputs.voc_id }}: ${{ inputs.task_id }}"
            git push -u origin "${{ steps.branch.outputs.branch }}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "${{ inputs.voc_id }}: ${{ inputs.task_id }}" \
            --body "$(cat <<EOF
          Implements task \`${{ inputs.task_id }}\` from \`${{ inputs.voc_id }}\` (\`${{ inputs.package_path }}\`).

          Closes #${{ inputs.issue_number }}.

          Implemented by Codex (attempt ${{ inputs.attempt }} of 2). Independent
          verification by Claude Code and required human approval are still pending -
          this PR is not authorized to merge on its own.

          Package path: \`${{ inputs.package_path }}\`
          EOF
          )"

      - name: Escalate on final failed attempt
        if: (steps.codex.outcome == 'failure' || steps.commit.outputs.has_changes == 'false') && inputs.attempt >= '2'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ inputs.issue_number }} --body \
            "Codex failed to produce a change on attempt ${{ inputs.attempt }}/2 for task \`${{ inputs.task_id }}\` in \`${{ inputs.voc_id }}\`. Stopping - not retrying automatically. A human needs to look at this task."

      - name: Fail job if Codex step failed
        if: steps.codex.outcome == 'failure'
        run: exit 1
