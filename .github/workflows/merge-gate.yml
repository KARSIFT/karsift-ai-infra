name: merge-gate (reusable)

# SHADOW_MODE is the one switch that matters in this file. It is true for every
# risk class right now because nothing in this loop has been proven yet - see
# DOC-18 Phase 9's own rollout ("Shadow mode -> Enable R0 -> Enable R1 -> ...").
# Flipping it to "false" is a deliberate future edit, made only after real
# evidence the loop is reliable - not a default.

on:
  workflow_call:
    inputs:
      shadow_mode:
        required: false
        type: string
        default: "true"

jobs:
  # Path 1: on every PR update, report what the gate *would* do. Never merges.
  report-shadow-status:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Determine risk class and verification status
        id: status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number=${{ github.event.pull_request.number }}

          checks_ok=$(gh pr checks "$pr_number" --json state -q \
            '[.[].state] | all(. == "SUCCESS" or . == "SKIPPED")' || echo "false")
          echo "checks_ok=$checks_ok" >> "$GITHUB_OUTPUT"

          verdict=$(gh api "repos/${{ github.repository }}/issues/$pr_number/comments" \
            --jq '[.[] | select(.body | startswith("**Independent verification"))] | last | .body // ""')
          if echo "$verdict" | grep -q '^FAIL'; then
            echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
          elif echo "$verdict" | grep -qi 'PASS WITH NON-BLOCKING FINDINGS'; then
            echo "verdict=PASS_WITH_FINDINGS" >> "$GITHUB_OUTPUT"
          elif echo "$verdict" | grep -q 'PASS'; then
            echo "verdict=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=PENDING" >> "$GITHUB_OUTPUT"
          fi

      - name: Post shadow-mode status
        if: inputs.shadow_mode == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number=${{ github.event.pull_request.number }}
          if [ "${{ steps.status.outputs.checks_ok }}" = "true" ] && [ "${{ steps.status.outputs.verdict }}" != "FAIL" ] && [ "${{ steps.status.outputs.verdict }}" != "PENDING" ]; then
            decision="WOULD AUTO-MERGE (shadow mode - not actually merging)"
          else
            decision="would NOT merge yet (checks_ok=${{ steps.status.outputs.checks_ok }}, verdict=${{ steps.status.outputs.verdict }})"
          fi
          gh pr comment "$pr_number" --body "**merge-gate (shadow mode):** $decision. Reply \`approved\` to actually merge - shadow mode does not auto-merge at any risk class yet."

  # Path 2: the founder replies "approved". Verifies CI is green and a PASS
  # verdict exists, then merges. This is the only real merge path today,
  # regardless of risk class or shadow_mode.
  approve-and-merge:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: read
      checks: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Check approval signal
        id: check
        env:
          FOUNDER_USERNAME: m-e-h-r-d-a-a-d
        run: |
          if [ "${{ github.event.comment.body }}" = "approved" ] && \
             [ "${{ github.event.comment.user.login }}" = "$FOUNDER_USERNAME" ]; then
            echo "approved"
          else
            echo "not approved (author=${{ github.event.comment.user.login }}, body='${{ github.event.comment.body }}')"
            exit 1
          fi

      - name: Verify CI is green and verification passed
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number=${{ github.event.issue.number }}

          checks_ok=$(gh pr checks "$pr_number" --json state -q \
            '[.[].state] | all(. == "SUCCESS" or . == "SKIPPED")' || echo "false")
          if [ "$checks_ok" != "true" ]; then
            echo "CI is not green yet - not merging."
            exit 1
          fi

          verdict=$(gh api "repos/${{ github.repository }}/issues/$pr_number/comments" \
            --jq '[.[] | select(.body | startswith("**Independent verification"))] | last | .body // ""')
          if echo "$verdict" | grep -q '^FAIL' || [ -z "$verdict" ]; then
            echo "No passing independent verification found - not merging."
            exit 1
          fi

      - name: Merge
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.issue.number }} --squash
