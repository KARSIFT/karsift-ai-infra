name: merge-gate (reusable)

# Risk-aware, fail-closed by design. This mirrors the real activation model
# used across KARSIFT projects (see e.g. vocanova-platform's
# docs/governance/amendments/A-003 and its a003-transition-state.yaml):
# governance PERMISSION and technical ACTIVATION are separate states, R0-R3
# can in principle earn autonomous merge once proven, and R4 always requires
# a human decision-maker regardless of any switch. This workflow does not
# invent a project's risk policy - it only reads a risk declaration the PR
# already carries and enforces the gate proportionate to it.
#
# auto_merge_enabled defaults to "false" because that is the real, current,
# evidenced activation state in every KARSIFT project this has been checked
# against as of this writing - not a cautious guess. Flipping it to "true" is
# a deliberate future edit made after real evidence the loop is reliable for
# the risk classes it will actually cover, never a default.

on:
  workflow_call:
    inputs:
      auto_merge_enabled:
        description: 'Master switch for automatic merge at R0-R3. R4 never auto-merges regardless of this value.'
        required: false
        type: string
        default: "false"
      founder_username:
        description: 'GitHub login whose literal "approved" comment is a valid human merge decision.'
        required: true
        type: string

jobs:
  # Path 1: on every PR update, report risk class, check status, and what the
  # gate would do. Never merges by itself.
  report-status:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      # `gh pr checks` reads statusCheckRollup via GraphQL, which needs
      # this scope. Without it the call fails outright ("GraphQL: Resource
      # not accessible by integration"), the `|| echo "false"` fallback in
      # the step below swallows that error silently, and checks_ok is
      # unconditionally "false" regardless of what CI actually did - not a
      # race, not a self-reference issue (an earlier commit on this same
      # file guessed wrong and added an unrelated check-name filter to
      # "fix" a race that was never the real cause; that filter is
      # harmless and left in place, but this permission was necessary, and
      # turned out not sufficient by itself). Found on VOC-012's first real
      # auto-merge attempt: report-status printed checks_ok="false" on
      # every single evaluation, no matter how long CI/review had already
      # been green.
      checks: read
      # `checks: read` alone still wasn't enough: `gh pr checks`'s GraphQL
      # query also resolves each check's `checkSuite.workflowRun`, which is
      # a separate resource needing `actions: read` - without it the same
      # "Resource not accessible by integration" error recurs, just on a
      # narrower field path. Confirmed by re-running VOC-012's PR after
      # adding `checks: read` alone and seeing the identical checks_ok=false
      # outcome with a fully green PR, one permission short.
      actions: read
    outputs:
      risk: ${{ steps.status.outputs.risk }}
      checks_ok: ${{ steps.status.outputs.checks_ok }}
      verdict: ${{ steps.status.outputs.verdict }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine risk class, checks, and verification status
        id: status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number=${{ github.event.pull_request.number }}

          # Fail closed: no parseable declaration means "unknown", and unknown
          # is never auto-mergeable, at any value of auto_merge_enabled.
          body=$(gh pr view "$pr_number" --json body -q .body)
          risk=$(echo "$body" | grep -ioP '^[[:space:]]*Risk classification:[[:space:]]*R[0-4]\b' \
            | grep -oP 'R[0-4]' | head -1 || true)
          if [ -z "$risk" ]; then
            risk="unknown"
          fi
          echo "risk=$risk" >> "$GITHUB_OUTPUT"

          # Excludes this pipeline's own governance checks ("merge-gate / *",
          # "remediate / *") from the checks_ok computation - not just the
          # code checks (ci, review, etc.). This job's own check-run (and,
          # on the auto-merge path, its still-queued downstream siblings
          # merge-gate/auto-merge and remediate/decide+retry, which wait on
          # this job via `needs`) are necessarily non-terminal while this
          # step is running, so including them made checks_ok evaluate to
          # false almost every time on a PR with multiple concurrent
          # merge-gate/remediate jobs in flight - discovered on
          # vocanova-platform-sandbox's first real VOC-012 auto-merge
          # attempt: ci and review had both genuinely passed, but checks_ok
          # was false anyway because this job's own in-progress check (and
          # its queued dependents) were included in the "all checks green"
          # count. The single-job "approved"-comment path mostly avoided
          # this by luck (fewer concurrent jobs, less chance of catching one
          # mid-flight), not by design - it has the identical bug below.
          checks_ok=$(gh pr checks "$pr_number" --json name,state -q \
            '[.[] | select( ((.name|startswith("merge-gate")) or (.name|startswith("remediate"))) | not )] | map(.state) | all(. == "SUCCESS" or . == "SKIPPED")' \
            || echo "false")
          echo "checks_ok=$checks_ok" >> "$GITHUB_OUTPUT"

          verdict=$(gh api "repos/${{ github.repository }}/issues/$pr_number/comments" \
            --jq '[.[] | select(.body | startswith("**Independent verification"))] | last | .body // ""')

          # A prior '^FAIL' anchor here missed "## Verdict: **FAIL**" - a
          # markdown heading with the bold token on the same line, not
          # alone at line-start (vocanova-platform-sandbox VOC-013-T00's
          # first real FAIL run, discovered the same day remediate.yml hit
          # the identical bug independently). prompts/review.md now
          # requires an exact, undecorated "VERDICT: ..." anchor as the
          # reviewer's literal last line - match that instead of guessing
          # at markdown formatting. Order matters: FAIL is checked before
          # either PASS form so a FAIL can never be misread as a pass.
          if echo "$verdict" | grep -qE '^VERDICT:[[:space:]]*FAIL[[:space:]]*$'; then
            echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
          elif echo "$verdict" | grep -qE '^VERDICT:[[:space:]]*PASS WITH NON-BLOCKING FINDINGS[[:space:]]*$'; then
            echo "verdict=PASS_WITH_FINDINGS" >> "$GITHUB_OUTPUT"
          elif echo "$verdict" | grep -qE '^VERDICT:[[:space:]]*PASS[[:space:]]*$'; then
            echo "verdict=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=PENDING" >> "$GITHUB_OUTPUT"
          fi

      - name: Post status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number=${{ github.event.pull_request.number }}
          risk="${{ steps.status.outputs.risk }}"
          checks_ok="${{ steps.status.outputs.checks_ok }}"
          verdict="${{ steps.status.outputs.verdict }}"

          gates_pass=false
          if [ "$checks_ok" = "true" ] && [ "$verdict" != "FAIL" ] && [ "$verdict" != "PENDING" ]; then
            gates_pass=true
          fi

          if [ "$risk" = "R4" ]; then
            decision="requires founder approval - R4 never auto-merges, regardless of auto_merge_enabled"
          elif [ "$risk" = "unknown" ]; then
            decision="requires founder approval - no parseable 'Risk classification: R#' line found in the PR body, failing closed"
          elif [ "$gates_pass" = "true" ] && [ "${{ inputs.auto_merge_enabled }}" = "true" ]; then
            decision="WOULD AUTO-MERGE ($risk, auto_merge_enabled=true)"
          elif [ "$gates_pass" = "true" ]; then
            decision="gates pass for $risk but auto_merge_enabled=false - requires founder approval"
          else
            decision="would NOT merge yet (risk=$risk, checks_ok=$checks_ok, verdict=$verdict)"
          fi

          gh pr comment "$pr_number" --body "**merge-gate:** $decision. Reply \`approved\` (as the configured founder identity) to merge regardless of automation state - that is always a valid human decision at any risk class."

  # Path 2: a human (the configured founder identity) replies "approved".
  # Verifies CI is green and a passing verdict exists, then merges. This
  # remains valid for every risk class, including R4 and "unknown" - a
  # human approval is a human approval.
  approve-and-merge:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: read
      checks: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      # COMMENT_BODY and COMMENT_AUTHOR go through env:, never interpolated
      # directly into the script via ${{ }} - a comment body is arbitrary
      # attacker-controlled text (anyone who can comment on the PR writes
      # it), and this job has contents:write + pull-requests:write. Direct
      # ${{ github.event.comment.body }} interpolation would splice that raw
      # text into the bash source before bash parses it - a single comment
      # containing a backtick or `"; <anything>; "` is a script-injection RCE
      # in a privileged workflow, not a hypothetical. env: variable expansion
      # does not get re-parsed for further substitution, so this is safe.
      - name: Check approval signal
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          FOUNDER_USERNAME: ${{ inputs.founder_username }}
        run: |
          if [ "$COMMENT_BODY" = "approved" ] && [ "$COMMENT_AUTHOR" = "$FOUNDER_USERNAME" ]; then
            echo "approved"
          else
            echo "not approved (author=$COMMENT_AUTHOR, body='$COMMENT_BODY')"
            exit 1
          fi

      - name: Verify CI is green and verification passed
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number=${{ github.event.issue.number }}

          # Same self-reference fix as report-status above: exclude this
          # pipeline's own governance checks so this job's own in-progress
          # check-run doesn't count against itself.
          checks_ok=$(gh pr checks "$pr_number" --json name,state -q \
            '[.[] | select( ((.name|startswith("merge-gate")) or (.name|startswith("remediate"))) | not )] | map(.state) | all(. == "SUCCESS" or . == "SKIPPED")' \
            || echo "false")
          if [ "$checks_ok" != "true" ]; then
            echo "CI is not green yet - not merging."
            exit 1
          fi

          verdict=$(gh api "repos/${{ github.repository }}/issues/$pr_number/comments" \
            --jq '[.[] | select(.body | startswith("**Independent verification"))] | last | .body // ""')

          # Previously fail-open: only refused on a literal '^FAIL' match or
          # an empty string, so any verdict text that wasn't recognized -
          # including a real FAIL formatted as "## Verdict: **FAIL**" -
          # fell through and merged anyway on a human "approved" comment.
          # That's the opposite of this file's documented fail-closed
          # design. Require positive proof of PASS instead of absence of a
          # recognized FAIL - same "VERDICT: ..." anchor as report-status,
          # per prompts/review.md.
          if ! echo "$verdict" | grep -qE '^VERDICT:[[:space:]]*PASS([[:space:]]*|[[:space:]]+WITH NON-BLOCKING FINDINGS[[:space:]]*)$'; then
            echo "No passing independent verification found - not merging."
            exit 1
          fi

      - name: Merge
        if: steps.check.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.issue.number }} --squash

  # Path 3: auto_merge_enabled=true and the report-status job already found
  # gates_pass for a risk class below R4. This only runs anything once a
  # project deliberately flips the switch - it is inert while the switch is
  # false, which is the default and the current real state everywhere.
  auto-merge:
    needs: report-status
    if: |
      github.event_name == 'pull_request' &&
      inputs.auto_merge_enabled == 'true' &&
      needs.report-status.outputs.risk != 'R4' &&
      needs.report-status.outputs.risk != 'unknown' &&
      needs.report-status.outputs.checks_ok == 'true' &&
      needs.report-status.outputs.verdict != 'FAIL' &&
      needs.report-status.outputs.verdict != 'PENDING'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Merge automatically
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash
