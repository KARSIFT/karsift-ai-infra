name: claude-verify (reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      package_path:
        description: 'Path to the change package under specs/changes/, e.g. "specs/changes/VOC-007-some-slug"'
        required: true
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Checkout vocanova-ai-infra
        uses: actions/checkout@v4
        with:
          repository: KARSIFT/vocanova-ai-infra
          path: vocanova-ai-infra

      - name: Resolve Claude verifier model
        id: model
        run: |
          MODEL=$(bash vocanova-ai-infra/config/resolve-model.sh claude-verifier vocanova-ai-infra/config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Fetch PR diff, metadata, and exact SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
          gh pr view ${{ inputs.pr_number }} --json body,title,headRefOid > /tmp/pr.json
          echo "sha=$(jq -r .headRefOid /tmp/pr.json)" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        run: |
          {
            cat vocanova-ai-infra/prompts/claude-verify.md
            echo
            echo "## Reviewed commit SHA: ${{ steps.pr.outputs.sha }}"
            echo
            echo "## Package under review"
            echo
            echo "### specification.md"
            cat "${{ inputs.package_path }}/specification.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### acceptance-criteria.md"
            cat "${{ inputs.package_path }}/acceptance-criteria.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### impact-analysis.md (protected areas, declared risk)"
            cat "${{ inputs.package_path }}/impact-analysis.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### change.yaml"
            cat "${{ inputs.package_path }}/change.yaml" 2>/dev/null || echo "(missing)"
            echo
            echo "## PR metadata"
            cat /tmp/pr.json
            echo
            echo "## Diff"
            cat /tmp/pr.diff
          } > /tmp/verify-prompt.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # Read-only tools only, no --dangerously-skip-permissions: Claude Code
      # has no repository-write authority here, by CLAUDE.md's own rule, not
      # just as an implementation convenience.
      - name: Run independent verification
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          claude --model "${{ steps.model.outputs.model }}" \
            --allowedTools "Read,Grep,Glob" \
            -p "$(cat /tmp/verify-prompt.txt)" > /tmp/verdict.md
          cat /tmp/verdict.md

      - name: Post verification comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**Independent verification - bound to commit \`${{ steps.pr.outputs.sha }}\`**"
            echo
            cat /tmp/verdict.md
          } > /tmp/verdict-comment.md
          gh pr comment ${{ inputs.pr_number }} --body-file /tmp/verdict-comment.md
