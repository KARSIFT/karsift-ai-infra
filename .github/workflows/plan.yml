name: plan (reusable)

# Runs the "planner" role: turns a request into a full DRAFT change package in
# the calling project's own package format (read from package_template_path).
# Never adopts, authorizes, implements, or merges anything - a human still has
# to review and adopt the resulting change.yaml, exactly as with a
# human-drafted package today. Which model fills the "planner" role is
# resolved from THIS repo's own config/roles.yml, same convention as
# implement.yml/review.yml.
#
# The request can come from three places, mutually exclusive per run:
#   - `request`: free text, written directly for this dispatch.
#   - `source_document_path`: an existing document already in the repo.
#   - `source_issue_number`: a GitHub issue - its full thread (body + every
#     comment so far) is fetched and given to the planner as the request,
#     whoever or whatever opened it. This is what makes "anyone (or any other
#     agent) opens an issue" a valid way into the system without also making
#     a bare issue implementation authority - see below.
#
# Deliberately does NOT open the per-task tracking issues that used to live
# here - that now happens in adopt.yml, triggered only once a human has
# actually adopted the draft (merged the PR with change.yaml's status flipped
# out of "draft"). Opening real, numbered issues at DRAFT time meant issues
# existed for proposals nobody had agreed to yet; moving issue-creation to
# adoption time means the only issues that ever carry implementation
# authority are ones a human has already signed off on the package behind.
#
# If the planner doesn't have enough to draft confidently - most likely for a
# source_issue_number run, where "anyone can open an issue" also means "the
# issue might just say 'this is broken' with no repro" - it writes a
# clarifying question instead of a package (see prompts/plan.md). This job
# posts that question as a comment on the originating issue and stops, no PR
# opened. A reply to that comment (from a human OR another agent - the
# calling project's pipeline.yml routes it back here the same way) re-runs
# this workflow with the updated thread. The one thing that must never
# happen: a bare issue directly becoming implementation authority without a
# human adopting a real package first - this workflow only ever produces a
# DRAFT, however it was triggered.
#
# Opens branches under a "plan/" prefix (not implement.yml's "agent/" prefix)
# on purpose - the calling project's pipeline.yml uses that prefix to skip
# extract-package-path/review/remediate for planning PRs. Those jobs assume a
# PR that IMPLEMENTS an existing package (with a "Package path:" line in its
# body); a planning PR CREATES a package instead and has no such line. Left
# unguarded, extract-package-path's unconditional `exit 1` on a missing
# "Package path:" line would fail a check on the PR and - because
# merge-gate.yml's approve-and-merge path requires all checks green - would
# block even the human "approved"-comment merge path. merge-gate.yml itself
# needs no changes: a planning PR never carries a "Risk classification: R#"
# line, so it already falls into the existing fail-closed "requires founder
# approval" path without any special-casing.

on:
  workflow_call:
    inputs:
      request:
        description: "Free-text description of what this change package should cover. Optional if source_document_path or source_issue_number is given."
        required: false
        type: string
        default: ""
      source_document_path:
        description: "Path to an existing document in the repo to draft the package from, instead of/alongside free text."
        required: false
        type: string
        default: ""
      source_issue_number:
        description: "GitHub issue number whose full thread (body + comments) is the request. When set, a needs-info outcome comments back on this issue instead of failing."
        required: false
        type: string
        default: ""
      id_prefix:
        description: 'Project-specific package ID prefix, e.g. "VOC". Stays an input because package ID format is project policy, not something this repo opines on.'
        required: true
        type: string
      package_template_path:
        description: "Path to the calling project's own unapproved change-package template."
        required: false
        type: string
        default: "specs/templates/change-package"
      integration_branch:
        description: 'The calling project''s integration branch to base the draft off - "develop" for a develop/main split, "main" for GitHub-flow-only projects.'
        required: false
        type: string
        default: "develop"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      KARSIFT_BOT_APP_ID:
        description: "Optional. See implement.yml's secrets block for what this removes (the manual 'Approve workflows to run' click on bot-created PRs)."
        required: false
      KARSIFT_BOT_PRIVATE_KEY:
        description: "Optional, paired with KARSIFT_BOT_APP_ID."
        required: false

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.integration_branch }}

      - name: Checkout karsift-ai-infra
        uses: actions/checkout@v4
        with:
          repository: KARSIFT/karsift-ai-infra
          path: karsift-ai-infra

      - name: Check for GitHub App credentials
        id: has-app
        env:
          APP_ID: ${{ secrets.KARSIFT_BOT_APP_ID }}
        run: echo "configured=$([ -n \"$APP_ID\" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Mint App installation token
        id: app-token
        if: steps.has-app.outputs.configured == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KARSIFT_BOT_APP_ID }}
          private-key: ${{ secrets.KARSIFT_BOT_PRIVATE_KEY }}

      # Fetches the whole thread, not just the issue body - a follow-up
      # comment (from a human answering the planner's own clarifying
      # question, or from another agent adding a log excerpt after its
      # original terse issue) is often where the actually-useful content
      # lives. Also captures the issue title, used below for the slug/branch
      # name when no free-text request was given to derive one from.
      - name: Fetch source issue thread
        id: issue
        if: inputs.source_issue_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          n="${{ inputs.source_issue_number }}"
          title=$(gh issue view "$n" --json title -q .title)
          echo "title=$title" >> "$GITHUB_OUTPUT"
          {
            echo "Issue #$n: $title"
            echo
            gh issue view "$n" --json body -q .body
            echo
            gh api "repos/${{ github.repository }}/issues/$n/comments" \
              --jq '.[] | "--- comment by \(.user.login) at \(.created_at) ---\n\(.body)\n"'
          } > /tmp/issue-thread.txt

      - name: Ensure karsift labels exist
        if: inputs.source_issue_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          gh label create "karsift:needs-info" --color "B60205" \
            --description "Planner needs more information before it can draft a package - reply on this issue to continue" \
            --force
          gh label create "karsift:planned" --color "0E8A16" \
            --description "A draft change package has been proposed from this issue" \
            --force

      # Deterministic, not model-chosen: scan existing package directories for
      # the highest numeric suffix after id_prefix as a starting point, then
      # claim it for real via an atomic ref-creation race on the remote (see
      # below) - mirrors implement.yml's philosophy that anything mechanical
      # (branch names, commits, IDs) stays out of the model's hands.
      - name: Allocate next package ID
        id: id
        run: |
          set -euo pipefail
          prefix="${{ inputs.id_prefix }}"
          highest=0
          if [ -d "specs/changes" ]; then
            while IFS= read -r dir; do
              n=$(echo "$dir" | grep -oP "(?<=^${prefix}-)[0-9]+" || echo "")
              if [ -n "$n" ] && [ "$((10#$n))" -gt "$highest" ]; then
                highest=$((10#$n))
              fi
            done < <(find specs/changes -maxdepth 1 -mindepth 1 -type d -printf '%f\n' 2>/dev/null || true)
          fi

          # Scanning specs/changes alone isn't enough to prevent a collision:
          # a draft's own package directory only lands on integration_branch
          # once its PR is ADOPTED, not at draft time (see this workflow's
          # header comment on the plan/adopt split) - so two plan.yml runs
          # dispatched close together, or just both still-unmerged from
          # earlier, start the scan above from the same state and compute
          # the same "next" ID. Found live: two plan.yml runs dispatched a
          # few seconds apart both allocated VOC-016. `git push origin
          # HEAD:refs/karsift-ids/<id>` only succeeds if that ref doesn't
          # already exist anywhere on the remote - a plain (non-force) push
          # creating a brand-new ref name either wins outright or fails with
          # "already exists", which is exactly the atomic compare-and-swap a
          # numeric counter needs, using nothing but git itself. The ref
          # otherwise carries no meaning (it just points at this run's base
          # commit) and is never read back - it exists purely as a claim.
          candidate=$((highest + 1))
          claimed=""
          for _ in $(seq 1 50); do
            padded=$(printf "%03d" "$candidate")
            attempt="${prefix}-${padded}"
            if git push origin "HEAD:refs/karsift-ids/${attempt}" 2>/dev/null; then
              claimed="$attempt"
              break
            fi
            candidate=$((candidate + 1))
          done
          if [ -z "$claimed" ]; then
            echo "Could not claim a package ID after 50 attempts starting at ${prefix}-$(printf '%03d' $((highest + 1)))." >&2
            exit 1
          fi
          echo "id=${claimed}" >> "$GITHUB_OUTPUT"

      # Deterministic slug, not model output - same rationale as above. The
      # title source is whichever of these is present, in order: free-text
      # request, source document's basename, source issue's title. Lowercase,
      # non-alphanumeric runs collapsed to a single hyphen, trimmed, capped so
      # branch names stay sane.
      - name: Derive slug and branch name
        id: branch
        run: |
          set -euo pipefail
          title_source="${{ inputs.request }}"
          if [ -z "$title_source" ] && [ -n "${{ inputs.source_document_path }}" ]; then
            title_source=$(basename "${{ inputs.source_document_path }}")
          fi
          if [ -z "$title_source" ] && [ -n "${{ steps.issue.outputs.title }}" ]; then
            title_source="${{ steps.issue.outputs.title }}"
          fi
          slug=$(echo "$title_source" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-' | sed 's/-\+/-/g; s/^-//; s/-$//' | cut -c1-50)
          branch="plan/$(echo "${{ steps.id.outputs.id }}" | tr '[:upper:]' '[:lower:]')-${slug}"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "package_path=specs/changes/${{ steps.id.outputs.id }}-${slug}" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch"

      - name: Resolve planner model
        id: model
        run: |
          MODEL=$(bash karsift-ai-infra/config/resolve-model.sh planner karsift-ai-infra/config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        run: |
          {
            cat karsift-ai-infra/prompts/plan.md
            if [ -n "${{ inputs.request }}" ]; then
              echo
              echo "## Request (free text)"
              echo "${{ inputs.request }}"
            fi
            if [ -n "${{ inputs.source_document_path }}" ]; then
              echo
              echo "## Request (source document: ${{ inputs.source_document_path }})"
              cat "${{ inputs.source_document_path }}" 2>/dev/null || echo "(unreadable)"
            fi
            if [ -n "${{ inputs.source_issue_number }}" ]; then
              echo
              echo "## Request (source issue thread)"
              cat /tmp/issue-thread.txt
            fi
            echo
            echo "## New package identity"
            echo "Package ID: ${{ steps.id.outputs.id }}"
            echo "Package path: ${{ steps.branch.outputs.package_path }}"
            echo "(Create this directory. Do not write anywhere else, except"
            echo " .karsift-plan-needs-info.md at the repo root if you need to ask a"
            echo " clarifying question instead - see this prompt's instructions above.)"
            echo
            echo "## Package template to mirror (${{ inputs.package_template_path }})"
            for f in "${{ inputs.package_template_path }}"/*; do
              echo
              echo "### $(basename "$f")"
              cat "$f" 2>/dev/null || echo "(unreadable)"
            done
            echo
            echo "## Recent packages, for house style"
            ls -1dt specs/changes/*/ 2>/dev/null | head -3 | while read -r d; do
              echo
              echo "### $d"
              ls "$d"
            done
            echo
            echo "## Governance documents, if present"
            for f in AGENTS.md CLAUDE.md; do
              if [ -f "$f" ]; then
                echo
                echo "### $f"
                cat "$f"
              fi
            done
          } > /tmp/plan-prompt.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run planner
        id: planner
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          claude --model "${{ steps.model.outputs.model }}" \
            --allowedTools "Read,Write,Edit,Bash,Grep,Glob" \
            -p "$(cat /tmp/plan-prompt.txt)"

      # Branches the whole rest of the job. If the planner asked a question
      # instead of drafting, every downstream package-handling step below is
      # skipped via this output - there is no partial/half-drafted state.
      - name: Check for a needs-info outcome
        id: needs-info
        if: steps.planner.outcome == 'success'
        run: |
          set -euo pipefail
          if [ -f ".karsift-plan-needs-info.md" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      # Only reachable with source_issue_number set (see prompts/plan.md: the
      # needs-info escape hatch exists specifically for issue-triggered runs,
      # where "anyone can open an issue" means the initial content may
      # genuinely be too thin to draft from). No PR is opened this run - the
      # branch is discarded unpushed. Labeling `karsift:needs-info` (and the
      # calling project's pipeline.yml routing further comments on a
      # so-labeled issue back into this same workflow) is what lets the reply
      # - from a human OR another agent - resume planning without a human
      # having to manually re-dispatch anything.
      - name: Post clarifying question and stop
        if: steps.needs-info.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.source_issue_number }}" ]; then
            echo "Planner needs more information but no source_issue_number was given to reply on:" >&2
            cat ".karsift-plan-needs-info.md" >&2
            exit 1
          fi
          n="${{ inputs.source_issue_number }}"
          gh issue comment "$n" --body "$(cat <<EOF
          **Planner needs more information before it can draft a package for this issue.**

          $(cat .karsift-plan-needs-info.md)

          Reply on this issue with the missing information to continue - no need to re-dispatch anything by hand.
          EOF
          )"
          gh issue edit "$n" --add-label "karsift:needs-info" --remove-label "karsift:planned" 2>/dev/null || \
            gh issue edit "$n" --add-label "karsift:needs-info"

      # Fail loud, not silent: a planner that wrote outside its own package
      # directory is a scope violation, not a judgment call worth a warning.
      - name: Verify scope discipline
        if: steps.planner.outcome == 'success' && steps.needs-info.outputs.needed != 'true'
        run: |
          set -euo pipefail
          package_path="${{ steps.branch.outputs.package_path }}"
          changed=$(git status --porcelain | awk '{print $2}')
          bad=$(echo "$changed" | grep -v "^karsift-ai-infra/" | grep -v "^${package_path}/" || true)
          if [ -n "$bad" ]; then
            echo "Planner wrote outside its own package directory ($package_path):" >&2
            echo "$bad" >&2
            exit 1
          fi

      # Don't trust the model to have left change.yaml's adoption fields
      # alone, even though the prompt tells it not to touch them - same
      # "deterministic step is the real enforcement, the prompt is not
      # enough on its own" pattern implement.yml already uses for git safety.
      #
      # Forces exactly the two fields implement.yml's own "Refuse to run
      # without an adopted, authorized package" check actually reads (see
      # that file): top-level `status` (must not be in
      # implementing/adopted/implementation-ready) and the *nested*
      # `implementation.authorized` boolean - not a flat
      # `implementation_authorized`/`approval_status`/`automatic_merge_allowed`
      # top-level field, which specs/templates/change-package/change.yaml's
      # own placeholder uses but real adopted packages (and implement.yml's
      # actual check) do not. Confirmed against a real adopted package
      # (vocanova-platform's VOC-006 change.yaml) and this smoke-test repo's
      # own TEST-003 change.yaml - both use the nested form; the flat-field
      # template is not what's actually enforced. Only touches these two
      # keys, leaving whatever other schema a project's own template defines
      # untouched.
      - name: Force draft status and unauthorized implementation in change.yaml
        if: steps.planner.outcome == 'success' && steps.needs-info.outputs.needed != 'true'
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          python3 - "${{ steps.branch.outputs.package_path }}/change.yaml" <<'PYEOF'
          import sys
          import yaml

          path = sys.argv[1]
          try:
              with open(path) as f:
                  data = yaml.safe_load(f) or {}
          except FileNotFoundError:
              sys.exit(f"Planner did not create {path} - refusing to proceed.")

          data["status"] = "draft"
          implementation = data.get("implementation") or {}
          implementation["authorized"] = False
          data["implementation"] = implementation

          with open(path, "w") as f:
              yaml.safe_dump(data, f, sort_keys=False)
          PYEOF

      - name: Commit and push
        id: commit
        if: steps.planner.outcome == 'success' && steps.needs-info.outputs.needed != 'true'
        run: |
          set -euo pipefail
          git config user.name "karsift-ai-infra-bot"
          git config user.email "actions@users.noreply.github.com"

          # Same rationale as implement.yml: undo any commit(s) the model may
          # have made itself without discarding the file changes, so this
          # step is the single source of truth for what gets pushed.
          git reset --soft "${{ steps.branch.outputs.base_sha }}"

          # karsift-ai-infra/ was checked out only so the planner could read
          # prompts/config - must never end up in its own commit (nested .git
          # would be staged as a gitlink otherwise). See implement.yml for
          # the exact incident this guards against.
          rm -rf karsift-ai-infra

          git add -A
          if git diff --cached --quiet; then
            echo "Planner made no changes - nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Plan: ${{ steps.id.outputs.id }} - ${{ steps.branch.outputs.slug }}"
            git push --force-with-lease -u origin "${{ steps.branch.outputs.branch }}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # Deliberately no "Risk classification: R#" or "Package path: `...`"
      # line (that literal wording) in this PR body - see this file's header
      # comment for why that absence is what keeps extract-package-path/
      # review/remediate/merge-gate behaving correctly for a planning PR
      # without any special-casing in merge-gate.yml itself. The package's
      # location is still stated below, just not under that exact literal
      # label extract-package-path's regex looks for.
      - name: Open PR
        id: pr
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          {
            echo "Draft change package proposed by the planner role (model resolved from"
            echo "karsift-ai-infra/config/roles.yml)."
            echo
            if [ -n "${{ inputs.source_issue_number }}" ]; then
              echo "In response to issue #${{ inputs.source_issue_number }}."
            fi
            if [ -n "${{ inputs.source_document_path }}" ]; then
              echo "Drafted from \`${{ inputs.source_document_path }}\`."
            fi
            if [ -n "${{ inputs.request }}" ]; then
              echo
              echo "> ${{ inputs.request }}"
            fi
            echo
            echo "**This is a draft, not an approved or authorized package.** Nothing in"
            echo "this PR grants implementation authority - a human reviews it and, if"
            echo "adopted, flips \`change.yaml\`'s status/authorization fields by hand."
            echo "Per-task tracking issues are opened automatically on adoption (once this"
            echo "PR merges with an adopted change.yaml), not before."
            echo
            echo "New package directory: \`${{ steps.branch.outputs.package_path }}\`"
          } > /tmp/pr-body.txt
          url=$(gh pr create \
            --base "${{ inputs.integration_branch }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "Plan: ${{ steps.id.outputs.id }} - ${{ steps.branch.outputs.slug }}" \
            --body-file /tmp/pr-body.txt)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Link source issue to the draft PR
        if: steps.commit.outputs.has_changes == 'true' && inputs.source_issue_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          n="${{ inputs.source_issue_number }}"
          gh issue comment "$n" --body "Draft change package proposed: ${{ steps.pr.outputs.url }}"
          gh issue edit "$n" --add-label "karsift:planned" --remove-label "karsift:needs-info" 2>/dev/null || \
            gh issue edit "$n" --add-label "karsift:planned"

      - name: Fail job if planner step failed
        if: steps.planner.outcome == 'failure'
        run: exit 1
