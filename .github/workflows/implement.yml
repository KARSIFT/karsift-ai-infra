name: implement (reusable)

# Runs the "implementer" role against one task from an approved change package.
# Which model fills that role is resolved from THIS repo's own config/roles.yml,
# so swapping models never touches a calling project's own workflow.
#
# KNOWN COMPROMISE, not a redesign: this currently runs the implementer role
# on Claude Code CLI, the same vendor as the reviewer role - see
# config/roles.yml's header comment for why (openai/codex-action requires a
# metered, billed OpenAI API key with no subscription-auth path, and that
# billing isn't set up yet). Same-vendor implement+review is not independent
# review. To restore Codex as the implementer once billing is available:
# revert this file's "Run implementer" step to `uses: openai/codex-action@v1`
# with an `openai-api-key` input (see git history for the exact prior form),
# and set config/roles.yml's `implementer` back to a Codex model/empty string.
# Nothing else in this file or in review.yml/merge-gate.yml needs to change -
# the role/prompt/branch/commit/PR machinery around it is provider-agnostic
# by design.

on:
  workflow_call:
    inputs:
      change_id:
        description: 'The adopted change package to implement from, e.g. "VOC-007"'
        required: true
        type: string
      package_path:
        description: 'Path to the package directory, e.g. "specs/changes/VOC-007-some-slug"'
        required: true
        type: string
      task_id:
        description: "The specific task ID from the package's task list being implemented this run"
        required: true
        type: string
      issue_number:
        description: "The GitHub issue carrying implementation authority for this task"
        required: true
        type: string
      attempt:
        description: 1 or 2. On attempt 2 failure, escalate to the issue and stop - no attempt 3.
        required: false
        type: string
        default: "1"
      integration_branch:
        description: 'The calling project''s integration branch to base the work off - "develop" for a develop/main split, "main" for GitHub-flow-only projects.'
        required: false
        type: string
        default: "develop"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.integration_branch }}

      - name: Checkout karsift-ai-infra
        uses: actions/checkout@v4
        with:
          repository: KARSIFT/karsift-ai-infra
          path: karsift-ai-infra

      - name: Refuse to run without an adopted, authorized package
        run: |
          pip install --quiet pyyaml
          python3 - "${{ inputs.package_path }}" "${{ inputs.issue_number }}" <<'PYEOF'
          import sys
          import yaml

          package_path, expected_issue = sys.argv[1:3]
          data = yaml.safe_load(open(f"{package_path}/change.yaml"))

          if data.get("status") not in ("implementing", "adopted", "implementation-ready"):
              sys.exit(f"Package status '{data.get('status')}' is not implementation-ready - refusing to run.")

          impl = data.get("implementation", {})
          if not impl.get("authorized"):
              sys.exit("Package implementation.authorized is not true - refusing to run.")

          authority_issue = str(impl.get("authority_issue", ""))
          if authority_issue and authority_issue != str(expected_issue):
              sys.exit(
                  f"Package authority_issue ({authority_issue}) does not match "
                  f"the issue this run was dispatched for ({expected_issue})."
              )

          print("Package is adopted and authorized - proceeding.")
          PYEOF

      - name: Create implementation branch
        id: branch
        run: |
          set -euo pipefail
          slug=$(echo "${{ inputs.task_id }}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-' | sed 's/-\+/-/g; s/^-//; s/-$//')
          change_lower=$(echo "${{ inputs.change_id }}" | tr '[:upper:]' '[:lower:]')
          branch="agent/${change_lower}-${slug}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch"

      - name: Resolve implementer model
        id: model
        run: |
          MODEL=$(bash karsift-ai-infra/config/resolve-model.sh implementer karsift-ai-infra/config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        id: prompt
        run: |
          {
            cat karsift-ai-infra/prompts/implement.md
            echo
            echo "## Package: ${{ inputs.change_id }}"
            echo
            echo "### specification.md"
            cat "${{ inputs.package_path }}/specification.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### acceptance-criteria.md"
            cat "${{ inputs.package_path }}/acceptance-criteria.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### implementation-plan.md"
            cat "${{ inputs.package_path }}/implementation-plan.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### tasks.md"
            cat "${{ inputs.package_path }}/tasks.md" 2>/dev/null || echo "(missing)"
            echo
            echo "## Task to implement now"
            echo "Task ID: ${{ inputs.task_id }}"
            echo "This is attempt ${{ inputs.attempt }} of 2."
          } > /tmp/implement-prompt.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # The implementer role gets write tools (unlike review.yml's read-only
      # reviewer) because its job is to actually produce the diff. It never
      # touches git directly beyond what Claude Code's Bash tool might run
      # for its own purposes - committing, pushing, and opening the PR remain
      # deterministic steps below, not something the model is trusted to do
      # itself. Swapping the implementer to a different provider/action means
      # changing this one step - the rest of the job (branch, commit, PR,
      # escalation) doesn't know or care which model produced the diff.
      - name: Run implementer
        id: implementer
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          claude --model "${{ steps.model.outputs.model }}" \
            --allowedTools "Read,Write,Edit,Bash,Grep,Glob" \
            -p "$(cat /tmp/implement-prompt.txt)"

      - name: Commit and push
        id: commit
        if: steps.implementer.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "karsift-ai-infra-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Implementer made no changes - nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "${{ inputs.change_id }}: ${{ inputs.task_id }}"
            git push -u origin "${{ steps.branch.outputs.branch }}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ inputs.integration_branch }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "${{ inputs.change_id }}: ${{ inputs.task_id }}" \
            --body "$(cat <<EOF
          Implements task \`${{ inputs.task_id }}\` from \`${{ inputs.change_id }}\` (\`${{ inputs.package_path }}\`).

          Closes #${{ inputs.issue_number }}.

          Implemented by the implementer role (attempt ${{ inputs.attempt }} of 2,
          model resolved from karsift-ai-infra/config/roles.yml). Independent review
          and required human approval are still pending - this PR is not authorized
          to merge on its own.

          Package path: \`${{ inputs.package_path }}\`
          EOF
          )"

      - name: Escalate on final failed attempt
        if: (steps.implementer.outcome == 'failure' || steps.commit.outputs.has_changes == 'false') && inputs.attempt >= '2'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ inputs.issue_number }} --body \
            "The implementer failed to produce a change on attempt ${{ inputs.attempt }}/2 for task \`${{ inputs.task_id }}\` in \`${{ inputs.change_id }}\`. Stopping - not retrying automatically. A human needs to look at this task."

      - name: Fail job if implementer step failed
        if: steps.implementer.outcome == 'failure'
        run: exit 1
