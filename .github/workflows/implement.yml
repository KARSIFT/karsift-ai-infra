name: implement (reusable)

# Runs the "implementer" role against one task from an approved change package.
# Which model fills that role is resolved from THIS repo's own config/roles.yml,
# so swapping models never touches a calling project's own workflow.
#
# KNOWN COMPROMISE, not a redesign: this currently runs the implementer role
# on Claude Code CLI, the same vendor as the reviewer role - see
# config/roles.yml's header comment for why (openai/codex-action requires a
# metered, billed OpenAI API key with no subscription-auth path, and that
# billing isn't set up yet). Same-vendor implement+review is not independent
# review. To restore Codex as the implementer once billing is available:
# revert this file's "Run implementer" step to `uses: openai/codex-action@v1`
# with an `openai-api-key` input (see git history for the exact prior form),
# and set config/roles.yml's `implementer` back to a Codex model/empty string.
# Nothing else in this file or in review.yml/merge-gate.yml needs to change -
# the role/prompt/branch/commit/PR machinery around it is provider-agnostic
# by design.

on:
  workflow_call:
    inputs:
      change_id:
        description: 'The adopted change package to implement from, e.g. "VOC-007"'
        required: true
        type: string
      package_path:
        description: 'Path to the package directory, e.g. "specs/changes/VOC-007-some-slug"'
        required: true
        type: string
      task_id:
        description: "The specific task ID from the package's task list being implemented this run"
        required: true
        type: string
      issue_number:
        description: "The GitHub issue carrying implementation authority for this task"
        required: true
        type: string
      attempt:
        description: 1 or 2. On attempt 2 failure, escalate to the issue and stop - no attempt 3.
        required: false
        type: string
        default: "1"
      integration_branch:
        description: 'The calling project''s integration branch to base the work off - "develop" for a develop/main split, "main" for GitHub-flow-only projects.'
        required: false
        type: string
        default: "develop"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      KARSIFT_BOT_APP_ID:
        description: >
          Optional. GitHub App ID for minting the PR-creation token. Without
          it, PR creation falls back to the default GITHUB_TOKEN, and GitHub
          will require a manual "Approve workflows to run" click on every
          resulting PR (a security behavior GitHub applies to any PR that
          GITHUB_TOKEN creates or updates, same-repo or not - not a bug in
          this workflow). Set this and KARSIFT_BOT_PRIVATE_KEY once a project
          has a GitHub App installed for it to remove that friction.
        required: false
      KARSIFT_BOT_PRIVATE_KEY:
        description: "Optional, paired with KARSIFT_BOT_APP_ID - see that input's description."
        required: false

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.integration_branch }}

      - name: Checkout karsift-ai-infra
        uses: actions/checkout@v4
        with:
          repository: KARSIFT/karsift-ai-infra
          path: karsift-ai-infra

      - name: Refuse to run without an adopted, authorized package
        id: package
        run: |
          pip install --quiet pyyaml
          python3 - "${{ inputs.package_path }}" "${{ inputs.issue_number }}" "$GITHUB_OUTPUT" <<'PYEOF'
          import sys
          import yaml

          package_path, expected_issue, github_output = sys.argv[1:4]
          data = yaml.safe_load(open(f"{package_path}/change.yaml"))

          if data.get("status") not in ("implementing", "adopted", "implementation-ready"):
              sys.exit(f"Package status '{data.get('status')}' is not implementation-ready - refusing to run.")

          impl = data.get("implementation", {})
          if not impl.get("authorized"):
              sys.exit("Package implementation.authorized is not true - refusing to run.")

          authority_issue = str(impl.get("authority_issue", ""))
          if authority_issue and authority_issue != str(expected_issue):
              sys.exit(
                  f"Package authority_issue ({authority_issue}) does not match "
                  f"the issue this run was dispatched for ({expected_issue})."
              )

          # Surface the package's own declared risk so "Open PR" can put a
          # real "Risk classification: R#" line in the PR body automatically -
          # merge-gate.yml fails closed (requires founder approval) without
          # one, so leaving this to be added by hand is a gap, not a feature.
          risk = str(data.get("risk", "")).upper()
          with open(github_output, "a") as f:
              f.write(f"risk={risk}\n")

          print(f"Package is adopted and authorized (declared risk: {risk or 'none declared'}) - proceeding.")
          PYEOF

      - name: Create implementation branch
        id: branch
        run: |
          set -euo pipefail
          slug=$(echo "${{ inputs.task_id }}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9' '-' | sed 's/-\+/-/g; s/^-//; s/-$//')
          change_lower=$(echo "${{ inputs.change_id }}" | tr '[:upper:]' '[:lower:]')
          branch="agent/${change_lower}-${slug}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch"

      - name: Resolve implementer model
        id: model
        run: |
          MODEL=$(bash karsift-ai-infra/config/resolve-model.sh implementer karsift-ai-infra/config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        id: prompt
        run: |
          {
            cat karsift-ai-infra/prompts/implement.md
            echo
            echo "## Package: ${{ inputs.change_id }}"
            echo
            echo "### specification.md"
            cat "${{ inputs.package_path }}/specification.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### acceptance-criteria.md"
            cat "${{ inputs.package_path }}/acceptance-criteria.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### implementation-plan.md"
            cat "${{ inputs.package_path }}/implementation-plan.md" 2>/dev/null || echo "(missing)"
            echo
            echo "### tasks.md"
            cat "${{ inputs.package_path }}/tasks.md" 2>/dev/null || echo "(missing)"
            echo
            echo "## Task to implement now"
            echo "Task ID: ${{ inputs.task_id }}"
            echo "This is attempt ${{ inputs.attempt }} of 2."
          } > /tmp/implement-prompt.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      # The implementer role gets write tools (unlike review.yml's read-only
      # reviewer) because its job is to actually produce the diff. It never
      # touches git directly beyond what Claude Code's Bash tool might run
      # for its own purposes - committing, pushing, and opening the PR remain
      # deterministic steps below, not something the model is trusted to do
      # itself. Swapping the implementer to a different provider/action means
      # changing this one step - the rest of the job (branch, commit, PR,
      # escalation) doesn't know or care which model produced the diff.
      - name: Run implementer
        id: implementer
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          claude --model "${{ steps.model.outputs.model }}" \
            --allowedTools "Read,Write,Edit,Bash,Grep,Glob" \
            -p "$(cat /tmp/implement-prompt.txt)"

      - name: Commit and push
        id: commit
        if: steps.implementer.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "karsift-ai-infra-bot"
          git config user.email "actions@users.noreply.github.com"

          # The implementer role's prompt says "commit your changes to the
          # branch" (wording that made sense for Codex, which never touches
          # git at all) but a Claude Code implementer has real Bash access
          # and can - and on karsift-ai-infra-smoke-test's second run, did -
          # take that literally and run `git commit` itself. That left
          # nothing staged for this step to find, so "no changes" was
          # reported and the PR silently never got opened despite the
          # implementer succeeding. `git reset --soft` to the branch's
          # starting commit un-does any commit(s) the model made without
          # discarding the file changes, so the diff below is correct
          # whether the model committed, didn't, or committed multiple
          # times - this step remains the single source of truth for what
          # actually gets pushed, regardless of model behavior. (The prompt
          # itself is also being fixed to stop suggesting this - see
          # prompts/implement.md - but relying on prompt compliance alone
          # for something this consequential isn't good enough on its own.)
          git reset --soft "${{ steps.branch.outputs.base_sha }}"

          # karsift-ai-infra/ was checked out earlier as a nested working copy
          # (its own .git) purely so the implementer could read prompts/
          # config - it must never end up in the implementer's own commit.
          # `git add -A` from the repo root treats a nested .git as a gitlink
          # (implicit submodule reference with no .gitmodules entry), which
          # is exactly what happened on karsift-ai-infra-smoke-test's first
          # real run: the reviewer correctly caught it as a Critical,
          # out-of-scope, repo-integrity-breaking finding and failed the PR.
          # Removing the directory before staging is more robust than a
          # pathspec exclusion on git add - it can't regress if someone later
          # adds another `git add` call downstream.
          rm -rf karsift-ai-infra

          git add -A
          if git diff --cached --quiet; then
            echo "Implementer made no changes - nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "${{ inputs.change_id }}: ${{ inputs.task_id }}"
            git push -u origin "${{ steps.branch.outputs.branch }}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # `secrets` isn't a recognized context inside a step-level `if:` here
      # (GitHub Actions rejects it outright: "Unrecognized named-value:
      # 'secrets'") - route the presence check through a plain env var and
      # a shell step's output instead, which is the reliable pattern.
      - name: Check for GitHub App credentials
        id: has-app
        env:
          APP_ID: ${{ secrets.KARSIFT_BOT_APP_ID }}
        run: echo "configured=$([ -n \"$APP_ID\" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # PRs created with the default GITHUB_TOKEN land their own resulting
      # pull_request-triggered workflow runs in "action_required" - GitHub
      # requires a manual "Approve workflows to run" click every time,
      # regardless of same-repo or fork (see this file's secrets: block
      # above for why). Minting a short-lived GitHub App installation token
      # instead avoids that entirely. Optional and backward-compatible: a
      # project with no App configured falls straight through to
      # github.token, unchanged from before.
      - name: Mint App installation token for PR creation
        id: app-token
        if: steps.commit.outputs.has_changes == 'true' && steps.has-app.outputs.configured == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KARSIFT_BOT_APP_ID }}
          private-key: ${{ secrets.KARSIFT_BOT_PRIVATE_KEY }}

      - name: Open PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          gh pr create \
            --base "${{ inputs.integration_branch }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "${{ inputs.change_id }}: ${{ inputs.task_id }}" \
            --body "$(cat <<EOF
          Implements task \`${{ inputs.task_id }}\` from \`${{ inputs.change_id }}\` (\`${{ inputs.package_path }}\`).

          Closes #${{ inputs.issue_number }}.

          Implemented by the implementer role (attempt ${{ inputs.attempt }} of 2,
          model resolved from karsift-ai-infra/config/roles.yml). Independent review
          and required human approval are still pending - this PR is not authorized
          to merge on its own.

          Risk classification: ${{ steps.package.outputs.risk }}

          Package path: \`${{ inputs.package_path }}\`
          EOF
          )"

      - name: Escalate on final failed attempt
        if: (steps.implementer.outcome == 'failure' || steps.commit.outputs.has_changes == 'false') && inputs.attempt >= '2'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ inputs.issue_number }} --body \
            "The implementer failed to produce a change on attempt ${{ inputs.attempt }}/2 for task \`${{ inputs.task_id }}\` in \`${{ inputs.change_id }}\`. Stopping - not retrying automatically. A human needs to look at this task."

      - name: Fail job if implementer step failed
        if: steps.implementer.outcome == 'failure'
        run: exit 1
