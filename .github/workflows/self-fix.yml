name: self-fix

# Fixes a bug in karsift-ai-infra itself - not a reusable workflow a calling
# project invokes, this runs directly against this repo's own checkout. Uses
# the same "implementer" role/model as implement.yml (config/roles.yml) -
# there is deliberately no separate role for this; fixing this repo's own
# bugs is the same kind of work as implementing a task, just against a
# different codebase and driven by a bug description instead of a change
# package.
#
# Always opens a PR for human review and never merges it. This repo's
# reusable workflows are referenced by every calling project via
# `@main` - a bad self-fix merged without review breaks every project at
# once, not just this one. No auto-merge path exists here, unlike
# merge-gate.yml's calling-project loop, and that is intentional, not a
# missing feature.

on:
  workflow_dispatch:
    inputs:
      bug_description:
        description: "What's broken and, if known, where - be specific; this is the implementer's only lead"
        required: true
        type: string
      issue_number:
        description: "GitHub issue reporting this bug, if one exists (used for 'Closes #N' - this repo's PRs merge straight to main, so that keyword actually fires here)"
        required: false
        type: string

jobs:
  self-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Create self-fix branch
        id: branch
        run: |
          set -euo pipefail
          suffix="${{ inputs.issue_number }}"
          if [ -z "$suffix" ]; then
            suffix=$(date +%s)
          fi
          branch="self-fix/${suffix}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git checkout -b "$branch"

      - name: Resolve implementer model
        id: model
        run: |
          MODEL=$(bash config/resolve-model.sh implementer config/roles.yml)
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        run: |
          {
            cat prompts/self-fix.md
            echo
            echo "## Bug report"
            echo
            echo "${{ inputs.bug_description }}"
            if [ -n "${{ inputs.issue_number }}" ]; then
              echo
              echo "Reported in issue #${{ inputs.issue_number }}."
            fi
          } > /tmp/self-fix-prompt.txt

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run self-fix
        id: fix
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          claude --model "${{ steps.model.outputs.model }}" \
            --allowedTools "Read,Write,Edit,Bash,Grep,Glob" \
            -p "$(cat /tmp/self-fix-prompt.txt)" | tee /tmp/self-fix-summary.txt

      - name: Commit and push
        id: commit
        if: steps.fix.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "karsift-ai-infra-bot"
          git config user.email "actions@users.noreply.github.com"

          # Same reset --soft safety net as implement.yml's "Commit and
          # push" step - if the model committed on its own despite the
          # prompt telling it not to, this normalizes to a single clean
          # diff regardless of what it actually did.
          git reset --soft "${{ steps.branch.outputs.base_sha }}"

          git add -A
          if git diff --cached --quiet; then
            echo "Self-fix made no changes - nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "self-fix: ${{ inputs.bug_description }}"
            git push --force-with-lease -u origin "${{ steps.branch.outputs.branch }}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          closes=""
          if [ -n "${{ inputs.issue_number }}" ]; then
            closes=$'\n\nCloses #${{ inputs.issue_number }}.'
          fi
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "self-fix: ${{ inputs.bug_description }}" \
            --body "$(cat /tmp/self-fix-summary.txt)${closes}

          ---
          Generated by self-fix.yml, model \`${{ steps.model.outputs.model }}\` (implementer role). This changes shared infra every calling project references via \`@main\` - review carefully before merging. Not auto-merged; no reviewer role ran against this diff."

      - name: Fail job if self-fix step failed
        if: steps.fix.outcome == 'failure'
        run: exit 1
