name: ci (reusable)

# Generic application-level checks only. vocanova-platform's own
# governance-policy.yml / repository-governance.yml workflows already run the
# governance/risk-classification checks in-repo - this does not duplicate them.

on:
  workflow_call: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect and run pnpm checks
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f package.json ] || [ ! -f pnpm-lock.yaml ]; then
            echo "no pnpm workspace yet - nothing this generic CI step knows how to run"
            exit 0
          fi

          corepack enable
          pnpm install --frozen-lockfile

          run_script_if_present() {
            local script="$1"
            if pnpm run 2>/dev/null | grep -qE "^\s+$script$"; then
              echo "== pnpm run $script =="
              pnpm run "$script"
            else
              echo "== no '$script' script - skipping =="
            fi
          }

          run_script_if_present format:check
          run_script_if_present lint
          run_script_if_present typecheck
          run_script_if_present test
          run_script_if_present build
