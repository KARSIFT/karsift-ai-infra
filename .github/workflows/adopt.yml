name: adopt (reusable)

# The other half of plan.yml's split: plan.yml only ever drafts a package and
# opens a PR for it - this workflow is what actually opens the per-task
# tracking issues that carry real implementation authority, and it only does
# that once a human has adopted the draft (merged a "plan/"-branch PR whose
# change.yaml no longer says "draft"). Moving issue-creation here, out of
# plan.yml, means a proposal nobody has agreed to yet never has a real,
# numbered issue attached to it - only an adopted package does.
#
# Refuses to open anything if the merged PR's change.yaml is still in draft
# state (status == "draft" or implementation.authorized != true) - a human
# merging an unadopted draft without editing it first is a mistake to leave
# visible (no issues silently appear), not something to work around.
#
# If the package's requirement_source records an originating issue (the one
# that kicked off planning, if any - see plan.yml's source_issue_number),
# that issue gets a closing comment pointing at the real task issue(s), so
# anyone following the thread - human or another agent - can see where the
# work actually landed.

on:
  workflow_call:
    inputs:
      pr_number:
        description: "The plan/-branch PR that just merged."
        required: true
        type: string
    secrets:
      KARSIFT_BOT_APP_ID:
        required: false
      KARSIFT_BOT_PRIVATE_KEY:
        required: false

jobs:
  adopt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      # Determined before checkout, without needing one: a plan/-branch PR
      # can merge into "develop" or "main" or anything else a project uses as
      # its integration_branch, and that's NOT necessarily this repo's
      # default branch - checking out the wrong one here would silently
      # commit the task roster to the wrong branch below.
      - name: Determine the PR's target branch
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          branch=$(gh pr view "${{ inputs.pr_number }}" --json baseRefName -q .baseRefName)
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.branch }}

      - name: Check for GitHub App credentials
        id: has-app
        env:
          APP_ID: ${{ secrets.KARSIFT_BOT_APP_ID }}
        run: echo "configured=$([ -n \"$APP_ID\" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Mint App installation token
        id: app-token
        if: steps.has-app.outputs.configured == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KARSIFT_BOT_APP_ID }}
          private-key: ${{ secrets.KARSIFT_BOT_PRIVATE_KEY }}

      # The merged PR's body records the package path (see plan.yml's "Open
      # PR" step: "New package directory: `...`") - parsed the same
      # PR_BODY-through-env pattern pipeline.yml's own extract-package-path
      # job uses, for the same script-injection reason (a PR body is text
      # anyone who could open a PR controls).
      - name: Locate the adopted package
        id: locate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          PR_BODY_SOURCE: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          body=$(gh pr view "${{ inputs.pr_number }}" --json body -q .body)
          path=$(echo "$body" | grep -oP '(?<=New package directory: `)[^`]+')
          if [ -z "$path" ]; then
            echo "No 'New package directory: \`...\`' line in PR #${{ inputs.pr_number }} - not a plan.yml-authored PR, or its format changed. Refusing to guess." >&2
            exit 1
          fi
          echo "package_path=$path" >> "$GITHUB_OUTPUT"

      # Refuses to proceed on a still-draft change.yaml - see this file's
      # header comment. Also extracts requirement_source, so a later step can
      # thread a closing comment back to the originating issue if the
      # adopter's requirement_source is a GitHub issue URL in this repo.
      - name: Verify the package was actually adopted
        id: verify
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          python3 - "${{ steps.locate.outputs.package_path }}/change.yaml" "$GITHUB_OUTPUT" <<'PYEOF'
          import re
          import sys
          import yaml

          path, github_output = sys.argv[1:3]
          data = yaml.safe_load(open(path))

          status = data.get("status")
          impl = data.get("implementation") or {}
          authorized = impl.get("authorized")

          if status == "draft" or not authorized:
              sys.exit(
                  f"{path}: status={status!r}, implementation.authorized={authorized!r} - "
                  "this package was merged without being adopted. Refusing to open task "
                  "issues for an unadopted draft."
              )

          req_source = str(data.get("requirement_source", ""))
          m = re.search(r"/issues/(\d+)", req_source)
          with open(github_output, "a") as f:
              f.write(f"source_issue={m.group(1) if m else ''}\n")

          print(f"Adopted: status={status}, authorized={authorized}")
          PYEOF

      # Same parser plan.yml used to use before issue-opening moved here -
      # see its own comment history for why this tolerates more than one
      # house style of tasks.md rather than assuming one heading convention.
      - name: Open one issue per task
        id: issues
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          package_path="${{ steps.locate.outputs.package_path }}"
          change_id=$(basename "$package_path" | grep -oP '^[A-Z]+-\d+')
          tasks_file="$package_path/tasks.md"
          if [ ! -f "$tasks_file" ]; then
            echo "No tasks.md found at $tasks_file - cannot open task issues." >&2
            exit 1
          fi

          python3 - "$tasks_file" "$change_id" <<'PYEOF' > /tmp/tasks.tsv
          import re
          import sys

          tasks_file, change_id = sys.argv[1:3]
          id_prefix = change_id.rsplit("-", 1)[0]
          pattern = re.compile(rf'{re.escape(id_prefix)}-\d+-T\d+')
          seen = set()
          with open(tasks_file) as f:
              for line in f:
                  m = pattern.search(line)
                  if not m or m.group(0) in seen:
                      continue
                  seen.add(m.group(0))
                  title = line[m.end():].strip()
                  title = re.sub(r'^[\s\-–—:.]+', '', title) or m.group(0)
                  print(f"{m.group(0)}\t{title[:100]}")
          PYEOF

          # Labeled at creation so plan.yml's issue-triggered planning never
          # mistakes one of its own task-tracking issues for a genuine new
          # request to plan - see templates/project-repo/.github/workflows/
          # pipeline.yml's plan-from-issue job, which only fires for issues
          # with no karsift:* label at all.
          gh label create "karsift:task" --color "1D76DB" \
            --description "System-generated task-tracking issue - not a planning request" \
            --force

          count=0
          echo "[" > /tmp/roster.json
          while IFS=$'\t' read -r task_id title; do
            [ -z "$task_id" ] && continue
            count=$((count + 1))
            issue_url=$(gh issue create \
              --title "$change_id: $task_id - $title" \
              --label "karsift:task" \
              --body "$(cat <<EOF
          Task \`$task_id\` from adopted package \`$change_id\` (\`$package_path\`).

          Dispatch \`implement.yml\` with:

          - change_id: \`$change_id\`
          - package_path: \`$package_path\`
          - task_id: \`$task_id\`
          - issue_number: this issue's number
          EOF
          )")
            issue_number=$(basename "$issue_url")
            [ "$count" -gt 1 ] && echo "," >> /tmp/roster.json
            printf '{"task_id": %s, "issue": %s}' "$(jq -Rn --arg v "$task_id" '$v')" "$issue_number" >> /tmp/roster.json
          done < /tmp/tasks.tsv
          echo "]" >> /tmp/roster.json

          if [ "$count" -eq 0 ]; then
            echo "Parsed zero tasks from $tasks_file - refusing to silently open nothing." >&2
            exit 1
          fi
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Opened $count task issue(s)."
          jq . /tmp/roster.json

      # release.yml's fixed roster of record - see plan.yml's former version
      # of this same step for the full rationale (a project's own tasks.md
      # prose is not something release.yml re-parses to determine
      # completion). Committed directly to the integration branch, not
      # through another PR - this is bookkeeping about issues that already
      # exist, not a content change needing its own review cycle.
      - name: Commit task roster
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          package_path="${{ steps.locate.outputs.package_path }}"
          mkdir -p "$package_path/.karsift"
          cp /tmp/roster.json "$package_path/.karsift/tasks.json"
          git config user.name "karsift-ai-infra-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "$package_path/.karsift/tasks.json"
          git commit -m "$(basename "$package_path" | grep -oP '^[A-Z]+-\d+'): record task-issue roster"
          git push origin HEAD:${{ steps.target.outputs.branch }} || \
            (echo "Could not push directly to ${{ steps.target.outputs.branch }} - check branch protection allows this bot identity, or push manually." >&2; exit 1)

      - name: Close the loop back to the originating issue, if any
        if: steps.verify.outputs.source_issue != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          gh issue comment "${{ steps.verify.outputs.source_issue }}" --body \
            "Adopted. ${{ steps.issues.outputs.count }} task issue(s) opened from the finalized package - see this repository's issue list for \`$(basename "${{ steps.locate.outputs.package_path }}" | grep -oP '^[A-Z]+-\d+')\`."
