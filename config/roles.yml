# Role -> current model. This is the ONLY file that names a specific AI vendor
# or model anywhere in this repo. Every workflow reads a *role* name
# ("implementer", "reviewer") and resolves it here - swap who occupies a role
# by editing this one file, not by touching workflow logic.
#
# "implementer" and "reviewer" are supposed to stay different model vendors -
# same-vendor review isn't independent review, it's self-review. Restored
# 2026-07-24: OpenAI API billing is now set up, so the implementer runs on
# openai/codex-action again (see implement.yml's header comment) while the
# reviewer stays on Claude Code - real cross-vendor independence, not the
# same-vendor compromise this repo ran under for a while (see git history of
# this file for that period, if it matters later).
#
# implementer is pinned to a Codex *mini* model, not full-size Codex,
# specifically for cost: the OpenAI account behind OPENAI_API_KEY is running
# on a small prepaid credit balance (founder decision, 2026-07-24), and the
# mini-codex tier holds most of full Codex's agentic coding/tool-calling
# capability at roughly 5-10x lower per-token cost - see OpenAI's current
# pricing before assuming this exact model string is still the cheapest
# capable option; that ranking moves fast.
#
# Leave a value empty to use that provider's own action/CLI current default
# model instead of pinning a version here.

implementer: gpt-5.1-codex-mini  # currently: openai/codex-action - pinned to the mini tier for cost, see note above
reviewer: claude-sonnet-5        # currently: Claude Code CLI (see prompts/review.md)

# planner has no cross-vendor independence requirement the way implementer/reviewer
# do - its output is a DRAFT change package a human reviews and adopts (or doesn't),
# never something an independent AI verifier checks the way review.yml checks
# implementer output.
planner: claude-sonnet-5         # currently: Claude Code CLI (see prompts/plan.md)
