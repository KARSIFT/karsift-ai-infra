name: pipeline

# Thin file. All real logic lives in KARSIFT/karsift-ai-infra's reusable
# workflows - this just wires triggers to them. Runs alongside (not instead
# of) this repo's own governance/risk-classification workflows, if any.
#
# `plan` turns a request (free text, an existing document, or a GitHub issue's
# whole thread) into a DRAFT change package (planner role, see plan.yml) - it
# never adopts, authorizes, or implements anything, a human still does that by
# hand, by reviewing and merging the draft PR. `adopt` then opens the real
# per-task tracking issues, but only once that merge has happened - not at
# draft time. `plan-from-issue` is what makes "anyone (a human, or another
# agent - e.g. one that reads application logs and notices a bug) just opens
# an issue" a valid way in: it auto-drafts a package from that issue, asking a
# clarifying question back on the issue itself if there isn't enough to go on
# yet, but a bare issue never becomes implementation authority on its own -
# adoption is still the one required human decision point. Once a package is
# adopted, `implement` (dispatched per task, same as before) carries on from
# there.
#
# Copy this file into a project repo and fill in:
#   - founder_username below (whose "approved" comment is a valid merge decision)
#   - auto_merge_enabled, only once you have real evidence for this project's loop
#   - integration_branch below - "develop" if this project splits develop/main,
#     "main" if it's GitHub-flow-only (a single long-lived branch). Get this
#     wrong and the very first checkout step fails outright.
#   - id_prefix - appears TWICE (the workflow_dispatch default, and
#     plan-from-issue's hardcoded value) - keep both in sync, e.g. "VOC"
#   - your project's own PR-body convention for "Risk classification: R#" and
#     "Package path: `...`" if it differs from the defaults this template assumes
#
# PRIVATE REPO + GitHub Free org plan: org-level secrets (ANTHROPIC_API_KEY,
# OPENAI_API_KEY, etc.) silently do NOT reach private repos on a Free org plan,
# even when the secret's visibility is set to "All repositories" and the GitHub
# API reports it as configured for this repo - jobs just see an empty value
# with no error at workflow-definition time, only a runtime "Secret X is
# required, but not provided" failure. Confirmed on vocanova-platform-sandbox's
# first real run. If this repo is private and org secrets aren't reaching it,
# set the same secret again at the repo level (`gh secret set ANTHROPIC_API_KEY
# --repo OWNER/REPO`, likewise for OPENAI_API_KEY) rather than assuming the
# org-level one will work. Public repos and Team/Enterprise-plan orgs are
# unaffected.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  issue_comment:
    types: [created]
  issues:
    types: [opened, closed]
  workflow_dispatch:
    inputs:
      action:
        description: "Which reusable workflow to run"
        required: true
        type: choice
        options: [implement, plan]
        default: implement
      change_id:
        description: 'implement only: adopted package to implement from, e.g. "VOC-007"'
        required: false
        type: string
      package_path:
        description: 'implement only: path to the package directory, e.g. "specs/changes/VOC-007-some-slug"'
        required: false
        type: string
      task_id:
        description: "implement only: task ID from the package's task list"
        required: false
        type: string
      issue_number:
        description: "implement only: GitHub issue carrying implementation authority"
        required: false
        type: string
      attempt:
        description: "implement only: 1 or 2"
        required: false
        type: string
        default: "1"
      request:
        description: "plan only: free-text description of the change package to draft"
        required: false
        type: string
      source_document_path:
        description: "plan only: path to an existing document in the repo to draft from, instead of/alongside request"
        required: false
        type: string
      id_prefix:
        description: 'plan only: package ID prefix, e.g. "VOC"'
        required: false
        type: string
        default: "VOC"

jobs:
  implement:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'implement'
    uses: KARSIFT/karsift-ai-infra/.github/workflows/implement.yml@main
    with:
      change_id: ${{ inputs.change_id }}
      package_path: ${{ inputs.package_path }}
      task_id: ${{ inputs.task_id }}
      issue_number: ${{ inputs.issue_number }}
      attempt: ${{ inputs.attempt }}
      integration_branch: "develop"   # "main" for a GitHub-flow-only project
    secrets: inherit

  plan:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'plan'
    uses: KARSIFT/karsift-ai-infra/.github/workflows/plan.yml@main
    with:
      request: ${{ inputs.request }}
      source_document_path: ${{ inputs.source_document_path }}
      id_prefix: ${{ inputs.id_prefix }}
      integration_branch: "develop"   # match the value used for implement, above
    secrets: inherit

  # Lets ANYONE (or any other agent, authenticated however it authenticates)
  # kick off planning just by opening an issue - no manual workflow_dispatch
  # needed. Gated on the issue carrying NO karsift:* label at open time,
  # since this system's own issue-creation (adopt.yml's task issues,
  # release.yml's release-approval issues) always labels what it opens - see
  # those files' own comments. An unlabeled issue is, by construction,
  # something this system didn't create itself.
  #
  # Also fires on a later comment, but only if the issue is currently labeled
  # `karsift:needs-info` (the planner asked a clarifying question and is
  # waiting - see plan.yml) AND the comment isn't from a bot account, so the
  # planner's own posted question doesn't re-trigger itself in a loop. This
  # is deliberately NOT restricted to human commenters specifically - a
  # human replying and another agent (e.g. one that read a log and is
  # supplying the detail the planner asked for) replying both work exactly
  # the same way, through the same issue thread.
  plan-from-issue:
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened' && toJSON(github.event.issue.labels) == '[]') ||
      (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'karsift:needs-info') && github.event.comment.user.type != 'Bot')
    uses: KARSIFT/karsift-ai-infra/.github/workflows/plan.yml@main
    with:
      source_issue_number: ${{ github.event.issue.number }}
      id_prefix: "VOC"   # match the value used for the workflow_dispatch plan job, above
      integration_branch: "develop"   # match the value used for implement, above
    secrets: inherit

  # The other half of plan.yml's split: opens the real per-task tracking
  # issues (and, if this package traces back to an originating issue, closes
  # the loop on it) only once a "plan/"-branch PR actually merges - i.e. only
  # once a human has adopted the draft. See adopt.yml's header comment for
  # why this is a separate step from drafting rather than happening at PR-open
  # time.
  adopt:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'plan/')
    uses: KARSIFT/karsift-ai-infra/.github/workflows/adopt.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  ci:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    uses: KARSIFT/karsift-ai-infra/.github/workflows/ci.yml@main

  # Planning PRs (head branch prefixed "plan/" by plan.yml) create a package
  # rather than implementing one, so they never carry the "Package path:"
  # line this job requires - the startsWith guard below skips this (and
  # review/remediate, which depend on it) for those PRs instead of failing a
  # check that would otherwise block even the human "approved"-comment merge
  # path in merge-gate.yml. merge-gate.yml itself needs no such guard: a
  # planning PR never declares a "Risk classification: R#" either, so it
  # already falls into the existing fail-closed "requires founder approval"
  # path on its own.
  extract-package-path:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    outputs:
      package_path: ${{ steps.extract.outputs.package_path }}
    steps:
      # PR_BODY goes through env:, never ${{ }}-interpolated directly into
      # the script - a PR body is text anyone who can open a PR controls,
      # and splicing it raw into a bash source before bash parses it is a
      # script-injection vector (a body containing a backtick is enough).
      - name: Parse package path from PR body
        id: extract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          path=$(echo "$PR_BODY" | grep -oP '(?<=Package path: `)[^`]+')
          if [ -z "$path" ]; then
            echo "No 'Package path: \`...\`' line found in the PR body - review cannot run without it." >&2
            exit 1
          fi
          echo "package_path=$path" >> "$GITHUB_OUTPUT"

  review:
    needs: [ci, extract-package-path]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && startsWith(github.head_ref, 'agent/')
    uses: KARSIFT/karsift-ai-infra/.github/workflows/review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      package_path: ${{ needs.extract-package-path.outputs.package_path }}
      integration_branch: "develop"   # match the value used for implement, above
    secrets: inherit

  # Runs after every review. A no-op unless the verdict is FAIL - then it
  # either re-dispatches the implementer once (with the findings attached)
  # or, if that retry already happened, escalates to the authority issue
  # instead of trying a third time. See remediate.yml for the exact rule.
  remediate:
    needs: [review, extract-package-path]
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && startsWith(github.head_ref, 'agent/')
    uses: KARSIFT/karsift-ai-infra/.github/workflows/remediate.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      package_path: ${{ needs.extract-package-path.outputs.package_path }}
      integration_branch: "develop"   # match the value used for implement, above
    secrets: inherit

  # `needs: review` + the `always()` guard below fixes a real race: on a
  # plain `pull_request` event this job used to run with no dependency on
  # `review` at all, so it evaluated in parallel with (not after) review -
  # and since `ci` finishes faster than a full independent-review pass,
  # merge-gate's report-status routinely captured verdict=PENDING before
  # review had posted anything, then never got another chance to look
  # again (no further `pull_request` event fires unless something pushes a
  # new commit). Auto-merge was structurally unable to fire on a normal
  # single-commit PR - discovered on vocanova-platform-sandbox's first real
  # attempt to exercise `auto_merge_enabled`. `always()` is required
  # because a job depending on a *skipped* job is by default also skipped -
  # and `review` is deliberately skipped both on `issue_comment` events (the
  # human-"approved" merge path) and on planning PRs (`plan/`-prefixed head
  # branch, no package for the reviewer to check yet) - both cases must
  # still reach merge-gate so its status comment actually posts, rather than
  # requiring review's specific 'success' result which a planning PR's
  # deliberately-skipped review can never produce.
  merge-gate:
    needs: review
    if: |
      always() &&
      (
        github.event_name == 'issue_comment' ||
        (github.event_name == 'pull_request' && github.event.action != 'closed' && (needs.review.result == 'success' || needs.review.result == 'skipped'))
      )
    uses: KARSIFT/karsift-ai-infra/.github/workflows/merge-gate.yml@main
    with:
      founder_username: "CHANGE-ME"   # the GitHub login whose "approved" comment is a valid merge decision
      auto_merge_enabled: "false"     # flip only after real evidence for this project's loop
    secrets: inherit

  # The gate above the per-task loop: exactly one human approval per
  # completed change package (its full task roster closed), not per task -
  # gates promotion from integration_branch to production_branch. Routes
  # both `issues: closed` (package-completion detection) and
  # `issue_comment` (the founder's "approved" reply on a "Release: ..."
  # issue) to release.yml, which internally filters by event/action/issue
  # title the same way merge-gate.yml's own jobs do. Deploy is out of scope -
  # see release.yml's header comment.
  release:
    if: (github.event_name == 'issues' && github.event.action == 'closed') || github.event_name == 'issue_comment'
    uses: KARSIFT/karsift-ai-infra/.github/workflows/release.yml@main
    with:
      founder_username: "CHANGE-ME"   # same identity as merge-gate's founder_username, above
      integration_branch: "develop"   # match the value used elsewhere in this file
      production_branch: "main"
    secrets: inherit
